<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>playy.online — a little arcade of web playthings</title>
<meta name="description" content="A tiny studio of web playthings. Tong-its online, streaming, and more on the way." />
<meta property="og:title" content="playy.online" />
<meta property="og:description" content="A little arcade of web playthings — Tong-its, streaming, and more." />
<meta name="theme-color" content="#150c22" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#150c22; --bg-2:#1d1235; --surface:#271a44; --surface-hi:#312154;
    --gold:#ffc24b; --gold-deep:#f0a01f; --coral:#ff7a66; --mint:#5fe3c8;
    --lav:#c2b1e6; --lav-dim:#8f7fb8; --cream:#f4ecdd; --ink:#150c22;
    --line:rgba(255,255,255,.09);
    --display:'Fredoka', ui-rounded, 'Segoe UI', system-ui, sans-serif;
    --body:'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    --mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;min-height:100dvh;font-family:var(--body);color:var(--cream);
    background:
      radial-gradient(120% 80% at 50% -8%, #2a1747 0%, var(--bg-2) 42%, var(--bg) 100%);
    overflow-x:hidden;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;
  }
  /* faint dot grid texture */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1.4px);
    background-size:26px 26px;mask-image:radial-gradient(120% 90% at 50% 10%, #000 30%, transparent 78%);
  }
  /* ambient arcade glow blobs */
  .blob{position:fixed;z-index:0;border-radius:50%;filter:blur(70px);opacity:.5;pointer-events:none;}
  .blob.a{width:46vmax;height:46vmax;left:-14vmax;top:-12vmax;background:radial-gradient(circle, rgba(255,194,75,.55), transparent 62%);}
  .blob.b{width:42vmax;height:42vmax;right:-14vmax;top:18vmax;background:radial-gradient(circle, rgba(255,122,102,.5), transparent 62%);}
  .blob.c{width:38vmax;height:38vmax;left:30vmax;bottom:-20vmax;background:radial-gradient(circle, rgba(95,227,200,.34), transparent 62%);}

  .wrap{position:relative;z-index:1;width:100%;max-width:980px;margin:0 auto;padding:clamp(28px,6vw,64px) 22px 40px;flex:1 0 auto;}

  /* ---- hero / marquee ---- */
  header.hero{text-align:center;padding:clamp(22px,7vh,72px) 0 clamp(26px,5vh,48px);}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--lav-dim);
    display:inline-flex;align-items:center;gap:10px;}
  .eyebrow .led{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 10px var(--mint);}
  .marquee{margin:18px 0 0;line-height:.92;}
  .marquee .word{
    font-family:var(--display);font-weight:700;letter-spacing:-.02em;
    font-size:clamp(58px,15vw,140px);color:#fff5e0;
    text-shadow:
      0 0 1px #fff,
      0 0 18px rgba(255,194,75,.65),
      0 0 46px rgba(255,160,31,.5),
      0 6px 0 rgba(0,0,0,.18);
  }
  .marquee .dot-online{
    display:block;font-family:var(--mono);font-weight:600;
    font-size:clamp(15px,3.4vw,24px);letter-spacing:.14em;color:var(--gold);
    margin-top:6px;text-shadow:0 0 16px rgba(255,194,75,.4);
  }
  .tagline{margin:20px auto 0;max-width:46ch;font-size:clamp(15px,2.4vw,18px);color:var(--lav);line-height:1.55;}

  /* ---- shelf label ---- */
  .shelf-label{display:flex;align-items:center;gap:14px;margin:8px 0 18px;color:var(--lav-dim);}
  .shelf-label span{font-family:var(--mono);font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;white-space:nowrap;}
  .shelf-label::before,.shelf-label::after{content:"";height:1px;flex:1;background:var(--line);}

  /* ---- cabinets grid ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;}
  .cabinet{
    --accent:var(--gold);
    position:relative;display:flex;flex-direction:column;gap:16px;
    text-decoration:none;color:inherit;isolation:isolate;
    background:linear-gradient(180deg,var(--surface-hi),var(--surface));
    border:1px solid var(--line);border-radius:20px;padding:22px;
    box-shadow:0 16px 38px rgba(0,0,0,.36);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  /* power-on glow sweep */
  .cabinet::before{
    content:"";position:absolute;inset:0;border-radius:20px;z-index:-1;opacity:0;
    background:radial-gradient(80% 60% at 50% 0%, color-mix(in srgb, var(--accent) 32%, transparent), transparent 70%);
    transition:opacity .25s ease;
  }
  .cabinet:hover,.cabinet:focus-visible{
    transform:translateY(-6px);border-color:color-mix(in srgb,var(--accent) 55%,transparent);
    box-shadow:0 22px 50px rgba(0,0,0,.5), 0 0 0 1px color-mix(in srgb,var(--accent) 40%,transparent),
      0 0 30px color-mix(in srgb,var(--accent) 26%,transparent);
    outline:none;
  }
  .cabinet:hover::before,.cabinet:focus-visible::before{opacity:1;}
  .cabinet:focus-visible{outline:3px solid color-mix(in srgb,var(--accent) 70%,white);outline-offset:3px;}

  .cab-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .emblem{
    width:54px;height:54px;border-radius:15px;flex:0 0 auto;
    display:grid;place-items:center;font-size:24px;line-height:1;
    background:radial-gradient(120% 120% at 30% 20%, color-mix(in srgb,var(--accent) 26%,var(--surface)), var(--surface));
    border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.12), 0 0 18px color-mix(in srgb,var(--accent) 22%,transparent);
    color:#fff;
  }
  .emblem .suits{display:grid;grid-template-columns:1fr 1fr;gap:1px;font-size:15px;}
  .emblem .s-red{color:#ff8a7a;}
  .status{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--mint);background:rgba(95,227,200,.1);
    border:1px solid rgba(95,227,200,.32);padding:5px 9px;border-radius:999px;}
  .status .led{width:6px;height:6px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);}
  .status.soon{color:var(--lav-dim);background:rgba(255,255,255,.04);border-color:var(--line);}
  .status.soon .led{background:var(--lav-dim);box-shadow:none;}

  .cab-title{font-family:var(--display);font-weight:600;font-size:23px;margin:0;color:#fff7ea;}
  .cab-desc{margin:-6px 0 0;font-size:14.5px;line-height:1.5;color:var(--lav);}
  .cab-foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:6px;}
  .url{font-family:var(--mono);font-size:12.5px;color:color-mix(in srgb,var(--accent) 78%, var(--cream));overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .go{font-family:var(--mono);font-size:13px;color:var(--accent);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .go .arrow{transition:transform .18s ease;}
  .cabinet:hover .go .arrow,.cabinet:focus-visible .go .arrow{transform:translate(3px,-3px);}

  /* ghost "coming soon" cabinet */
  .cabinet.ghost{background:transparent;border-style:dashed;border-color:var(--line);box-shadow:none;cursor:default;justify-content:center;text-align:center;align-items:center;min-height:190px;gap:10px;}
  .cabinet.ghost:hover{transform:none;box-shadow:none;border-color:rgba(255,255,255,.16);}
  .cabinet.ghost .emblem{background:rgba(255,255,255,.03);border-color:var(--line);color:var(--lav-dim);box-shadow:none;}
  .cabinet.ghost h3{font-family:var(--display);font-size:18px;margin:0;color:var(--lav);}
  .cabinet.ghost p{margin:0;font-size:13px;color:var(--lav-dim);max-width:30ch;}

  footer{position:relative;z-index:1;flex:0 0 auto;text-align:center;padding:26px 22px 30px;color:var(--lav-dim);
    font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;}
  footer b{color:var(--gold);font-weight:600;}

  /* entrance */
  .rise{opacity:0;transform:translateY(14px);animation:rise .7s cubic-bezier(.2,.7,.2,1) forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}

  @media (prefers-reduced-motion: no-preference){
    .blob{animation:drift 22s ease-in-out infinite alternate;}
    .blob.b{animation-duration:28s;} .blob.c{animation-duration:34s;}
    @keyframes drift{to{transform:translate(4vmax,3vmax) scale(1.08);}}
    .marquee .word{animation:warmup 1.1s ease-out both;}
    @keyframes warmup{0%{opacity:0;}10%{opacity:.5;}14%{opacity:.15;}22%{opacity:.9;}26%{opacity:.4;}30%{opacity:1;}100%{opacity:1;}}
  }
  @media (prefers-reduced-motion: reduce){ .rise{opacity:1;transform:none;animation:none;} }
  @media (max-width:560px){ .wrap{padding-top:30px;} .cabinet{padding:18px;} }
</style>
</head>
<body>
  <div class="blob a"></div><div class="blob b"></div><div class="blob c"></div>

  <div class="wrap">
    <header class="hero">
      <div class="eyebrow rise"><span class="led"></span>play things, online</div>
      <h1 class="marquee rise" style="animation-delay:.05s">
        <span class="word">playy</span>
        <span class="dot-online">.online</span>
      </h1>
      <p class="tagline rise" style="animation-delay:.12s">A little arcade of web playthings. Pick a cabinet and jump in — no installs, no fuss.</p>
    </header>

    <div class="shelf-label rise" style="animation-delay:.16s"><span>Now playing</span></div>
    <main class="grid" id="grid"></main>
  </div>

  <footer>made for fun · <b>playy.online</b> · <span id="year"></span></footer>

  <script>
    // ───────────────────────────────────────────────────────────────────
    //  ADD A PROJECT: copy one block below, change the 5 fields, done.
    //   name    – shown as the title
    //   desc    – one plain line about what it is
    //   url     – the full address (e.g. https://yours.playy.online)
    //   accent  – "var(--gold)", "var(--coral)", "var(--mint)", or any hex like "#7aa2ff"
    //   glyph   – an emoji/symbol, or raw HTML for the emblem
    //   live    – true (shows LIVE) or false (shows SOON, not clickable)
    // ───────────────────────────────────────────────────────────────────
    const PROJECTS = [
      {
        name: "Tong-its",
        desc: "The Filipino rummy classic — play online with friends or against the AI.",
        url: "https://tongits.playy.online",
        accent: "var(--gold)",
        glyph: '<div class="suits"><span>♠</span><span class="s-red">♥</span><span class="s-red">♦</span><span>♣</span></div>',
        live: true,
      },
      {
        name: "Stream",
        desc: "Tune in and watch together. Live video, your way.",  // ← edit this line to match what Stream really is
        url: "https://stream.playy.online",
        accent: "var(--coral)",
        glyph: "▶",
        live: true,
      },
    ];

    const grid = document.getElementById("grid");
    PROJECTS.forEach((p, i) => {
      const tag = p.live ? "a" : "div";
      const el = document.createElement(tag);
      el.className = "cabinet rise";
      el.style.setProperty("--accent", p.accent || "var(--gold)");
      el.style.animationDelay = (0.2 + i * 0.06) + "s";
      if (p.live) { el.href = p.url; }
      const host = (() => { try { return new URL(p.url).host; } catch { return p.url; } })();
      el.innerHTML = `
        <div class="cab-top">
          <div class="emblem">${p.glyph || "🎮"}</div>
          <span class="status ${p.live ? "" : "soon"}"><span class="led"></span>${p.live ? "Live" : "Soon"}</span>
        </div>
        <h2 class="cab-title">${p.name}</h2>
        <p class="cab-desc">${p.desc}</p>
        <div class="cab-foot">
          <span class="url">${host}</span>
          ${p.live ? '<span class="go">Enter <span class="arrow">↗</span></span>' : '<span class="go" style="color:var(--lav-dim)">soon</span>'}
        </div>`;
      grid.appendChild(el);
    });

    // a friendly "growing" tile so visitors know more is coming
    const ghost = document.createElement("div");
    ghost.className = "cabinet ghost rise";
    ghost.style.animationDelay = (0.2 + PROJECTS.length * 0.06) + "s";
    ghost.innerHTML = `
      <div class="emblem">＋</div>
      <h3>More on the way</h3>
      <p>New playthings are being built. Check back soon.</p>`;
    grid.appendChild(ghost);

    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
